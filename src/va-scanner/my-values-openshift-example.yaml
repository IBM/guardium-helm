# Example values for deploying va-scanner on OpenShift
#
# Fill these placeholders before deployment:
# - registry.password: IBM entitlement key
#   URL: https://myibm.ibm.com/products-services/containerlibrary
# - gdp.apiKey: base64 API key from GDP
#   Command on GDP server:
#     grdapi create_api_key name=vascanner-ocp
# - gdp.certBase64: single-line base64 certificate
#   Command from a machine that can reach GDP:
#     openssl s_client -connect guardium.example.com:8443 -showcerts </dev/null 2>/dev/null | openssl x509 -outform PEM | base64 | tr -d '\n'
# - project/namespace: create it first on OpenShift
#   Command:
#     oc new-project va-scanner
namespace:
  create: false
  name: va-scanner
  labels:
    environment: production

replicaCount: 3

vaScannerPollInMins: 5

image:
  repository: cp.icr.io/cp/ibm-guardium-data-security-center/guardium/vascanner-12.2.0/va-scanner
  pullPolicy: IfNotPresent
  tag: "vascanner-v12.2.0"

imagePullSecrets:
  - name: ibm-entitlement-key

registry:
  username: "cp"
  password: "REPLACE_WITH_IBM_ENTITLEMENT_KEY" # https://myibm.ibm.com/products-services/containerlibrary
  email: "cp"
  server: cp.icr.io

gdp:
  host: "guardium.example.com" # Must match the server certificate hostname
  hostPort: "8443"
  agentPort: "8443"
  apiKey: "REPLACE_WITH_BASE64_API_KEY" # grdapi create_api_key name=vascanner-ocp
  agentName: "ocp-va-scanner-01"
  certBase64: "REPLACE_WITH_SINGLE_LINE_BASE64_CERTIFICATE" # openssl s_client -connect guardium.example.com:8443 -showcerts </dev/null 2>/dev/null | openssl x509 -outform PEM | base64 | tr -d '\n'
  username: ""
  clientId: ""
  clientPassword: ""
  clientSecret: ""
  httpProxyIp: ""
  httpProxyPort: ""
  cloudResourceName: ""

serviceAccount:
  create: true
  name: va-scanner
  annotations: {}

platform:
  type: openshift

podSecurityContext: {}

securityContext: {}

openshift:
  enabled: true
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

livenessProbe:
  enabled: true
  exec:
    command:
      - /bin/sh
      - -c
      - "kill -0 1 2>/dev/null"
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  exec:
    command:
      - /bin/sh
      - -c
      - "kill -0 1 2>/dev/null"
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podLabels: {}

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

revisionHistoryLimit: 10
progressDeadlineSeconds: 60
terminationGracePeriodSeconds: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

volumes:
  cert:
    name: va-cert
    mountPath: /var/vascanner/certs
    readOnly: true
    defaultMode: 0440

dnsPolicy: ClusterFirst
restartPolicy: Always
schedulerName: default-scheduler

hostAliases: [] # Usually empty when gdp.host already matches the certificate hostname

# 
