# VA Scanner Configuration
# Generated by docker-compose setup (mirrors Helm configmap.yaml)
#
# The VA Scanner application resolves ${...} tokens from environment variables at runtime.
# Do NOT replace these placeholders — they are filled automatically from your .env file.
[GDPHost_0]=
gdp.host=${GDP_HOST}
gdp.host.port=${GDP_HOST_PORT}
client.apiKey=${CLIENT_API_KEY}
client.name.internal=
client.registered=false

# Keystore configuration for enterprise CA certificates.
# The scanner automatically creates a PKCS12 keystore from the mounted PEM certificate.
guardium.keystore.path=/var/vascanner/vascanner_keystore.p12
guardium.keystore.type=PKCS12
