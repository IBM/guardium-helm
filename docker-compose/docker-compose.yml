# Guardium VA Scanner — docker-compose deployment (Use Case 2)
# Use Case 1 (Helm) is recommended for production Kubernetes/EKS/OpenShift environments.
# Use this file for VM-based or standalone deployments without a Kubernetes cluster.
#
# BEFORE running, complete manual setup (what Helm creates automatically):
#   Option A — automated:
#     chmod +x setup.sh && ./setup.sh
#
#   Option B — manual (see README.md for full instructions):
#     1. docker login cp.icr.io -u cp -p <IBM_ENTITLEMENT_KEY>          # mirrors: Secret ibm-entitlement-key
#     2. cp .env.example .env && vi .env                                 # mirrors: Secret va-scanner-credentials
#     3. openssl s_client -connect GDP_IP:8443 </dev/null 2>/dev/null \  # mirrors: Secret va-cert
#          | openssl x509 -outform PEM > certs/vascanner.pem
#     (config/guardAgent.properties is already provided — no action)    # mirrors: ConfigMap va-scanner-config
#
# Run (mirrors replicaCount: 3 in values.yaml):
#   docker compose up -d --scale scanner=3
#
# Stop:
#   docker compose down

services:
  scanner:
    image: "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
    pull_policy: if_not_present
    restart: always
    user: "1000:1000"

    env_file:
      - .env

    environment:
      # These names are what the VA Scanner application reads directly.
      # Values are sourced from .env (which mirrors the values.yaml gdp.* fields).
      GDP_HOST: "${GDP_HOST}"
      GDP_HOST_IP: "${GDP_HOST}"
      GDP_HOST_PORT: "${GDP_HOST_PORT}"
      GDP_AGENT_PORT: "${GDP_AGENT_PORT}"
      CLIENT_API_KEY: "${GDP_API_KEY}"
      VA_AGENT_NAME: "${GDP_AGENT_NAME}"
      VA_SCANNER_POLL_IN_MINS: "${VA_SCANNER_POLL_IN_MINS:-5}"

      # Optional fields — leave blank in .env to omit
      USERNAME: "${GDP_USERNAME:-}"
      CLIENT_ID: "${GDP_CLIENT_ID:-}"
      CLIENT_PASSWORD: "${GDP_CLIENT_PASSWORD:-}"
      CLIENT_SECRET: "${GDP_CLIENT_SECRET:-}"
      HTTP_PROXY_IP: "${GDP_HTTP_PROXY_IP:-}"
      HTTP_PROXY_PORT: "${GDP_HTTP_PROXY_PORT:-}"
      CLOUD_RESOURCE_NAME: "${GDP_CLOUD_RESOURCE_NAME:-}"

    volumes:
      # SSL certificate — place your decoded PEM file at certs/vascanner.pem
      - ./certs:/var/vascanner/certs:ro
      # Static properties config — mirrors the Helm configmap
      - ./config/guardAgent.properties:/var/vascanner/etc/guardAgent_static.properties:ro

    extra_hosts:
      # Maps the GDP certificate hostname to its actual IP address.
      # Mirrors the Helm hostAliases configuration.
      # Format: "hostname:ip" — set GDP_HOST_ALIAS_IP in .env (leave blank if not needed).
      - "${GDP_HOST}:${GDP_HOST_ALIAS_IP:-0.0.0.0}"

    deploy:
      resources:
        limits:
          cpus: "${RESOURCES_LIMITS_CPU:-1.0}"
          memory: "${RESOURCES_LIMITS_MEMORY:-2g}"
        reservations:
          cpus: "${RESOURCES_REQUESTS_CPU:-0.25}"
          memory: "${RESOURCES_REQUESTS_MEMORY:-512m}"
